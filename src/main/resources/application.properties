# SETTING SERVER PORT

server.port = 9001

#=======================================================================================================================
# SETTING DATABASE

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/spring_security_logging
spring.datasource.username = root
spring.datasource.password = admin

spring.jpa.hibernate.ddl-auto = create
#spring.jpa.show-sql = true

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.format_sql = true

#=======================================================================================================================
# SETTING LDAP

spring.ldap.embedded.port = 8389
spring.ldap.embedded.ldif = classpath:ldap-data.ldif
spring.ldap.embedded.base-dn = dc=springframework,dc=orq

# ldif stands for ldap data interchange format, it is basically the syntax for working with ldap
# base-dn tells our embedded lab, what the root node is

